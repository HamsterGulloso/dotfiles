source = ~/.config/hypr/config/theme.conf

general {
    hide_cursor = true
    imediate_render = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = global, 1, 0.5, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = $active_border
    check_color = $inactive_border
    fail_color = $warning_border

    font_color = $font_color
    fade_on_empty = false
    rounding = $rounding

    font_family = $font
    # placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font

    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 0, -150
    halign = center
    valign = top
}
