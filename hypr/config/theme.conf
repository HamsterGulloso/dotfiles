$sly_darker = rgb(4b5599)
$sly_darker_alpha = rgba(4b559933)
$sly_brighter = rgb(5fbde1)
$sly_brighter_alpha = rgba(5fbde133)
$inactive_color = rgb(777777)
$active_color = rgb(f5f5f5)

$active_border = $sly_darker $sly_brighter 45deg
$inactive_border = $sly_darker_alpha $sly_brighter_alpha 45deg

$warning_border = rgba(ff000033) rgba(ff0000ff) 45deg

$font = "Iosevka Nerd Font"
$font_color = rgb(143, 143, 143)

$rounding = 0

$linear = linear, 0, 0, 1, 1
$animation = global, 1, 0.5, linear 
