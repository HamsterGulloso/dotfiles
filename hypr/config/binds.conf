bindl = , switch:on:Lid Switch, exec, $lock
bindl = , switch:on:Lid Switch, exec, systemctl suspend

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, T, exec, $terminal
bind = $mainMod, I, exec, $terminal -e impala
bind = $mainMod, C, exec, $terminal -e bluetui
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser_private

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy --
bind = SHIFT, Print, exec, grim - | wl-copy --
                           

bind = $mainMod, RETURN, exec, $menu
bind = $mainMod, SPACE, exec, $statusbar
bind = $mainMod, ESCAPE, exec, $lock
bind = $mainMod SHIFT, ESCAPE, exit
bind = $mainMod CTRL, ESCAPE, exec, poweroff

# General
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, W, forcekillactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exec, $activeworkspace_keyword general:layout:monocle
bind = $mainMod SHIFT, M, exec, $activeworkspace_keyword general:layout:master
bind = $mainMod, D, exec, $activeworkspace_keyword general:layout:scrolling
bind = $mainMod SHIFT, D, exec, $activeworkspace_keyword general:layout:dwindle
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, G, togglegroup,
bind = $mainMod SHIFT, G, moveoutofgroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Monocle
bind = $mainMod, TAB, exec, ~/.config/hypr/scripts/if_workspace.sh "monocle" "hyprctl dispatch layoutmsg cyclenext"
bind = $mainMod SHIFT, TAB, exec, ~/.config/hypr/scripts/if_workspace.sh "monocle" "hyprctl dispatch layoutmsg cycleprev"

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window like the above
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move group like the above
bind = $mainMod CTRL, left, movewindoworgroup, l
bind = $mainMod CTRL, right, movewindoworgroup, r
bind = $mainMod CTRL, up, movewindoworgroup, u
bind = $mainMod CTRL, down, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, S, togglespecialworkspace, special

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, S, movetoworkspace, special

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, 1, changegroupactive, 1
bind = $mainMod CTRL, 2, changegroupactive, 2
bind = $mainMod CTRL, 3, changegroupactive, 3
bind = $mainMod CTRL, 4, changegroupactive, 4
bind = $mainMod CTRL, 5, changegroupactive, 5
bind = $mainMod CTRL, 6, changegroupactive, 6
bind = $mainMod CTRL, 7, changegroupactive, 7
bind = $mainMod CTRL, 8, changegroupactive, 8
bind = $mainMod CTRL, 9, changegroupactive, 9
bind = $mainMod CTRL, 0, changegroupactive, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#resizing
bind = $mainMod, period, resizeactive, 5% 0
bind = $mainMod, comma, resizeactive, -5% 0
bind = $mainMod, equal, resizeactive, 0 5%
bind = $mainMod, minus, resizeactive, 0 -5%

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = SHIFT ,XF86AudioRaiseVolume, exec, wpctl set-volume -p $(hyprctl activewindow -j | jq '.pid') -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = SHIFT ,XF86AudioLowerVolume, exec, wpctl set-volume -p $(hyprctl activewindow -j | jq '.pid') @DEFAULT_AUDIO_SINK@ 5%-
bindel = SHIFT ,XF86AudioMute, exec, wpctl set-mute -p $(hyprctl activewindow -j | jq '.pid') toggle

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = SHIFT, XF86MonBrightnessUp, exec, hyprctl hyprsunset temperature +500
bindel = SHIFT, XF86MonBrightnessDown, exec, hyprctl hyprsunset temperature -500
bindel = CTRL, XF86MonBrightnessUp, exec, hyprctl hyprsunset temperature 6000
bindel = CTRL, XF86MonBrightnessDown, exec, hyprctl hyprsunset temperature 1000

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
